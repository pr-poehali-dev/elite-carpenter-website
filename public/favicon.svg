<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#2C2416"/>
  <!-- Домик / треугольная крыша -->
  <polygon points="32,8 56,28 8,28" fill="#C9A84C"/>
  <!-- Стены дома -->
  <rect x="14" y="28" width="36" height="22" fill="#C9A84C"/>
  <!-- Дверь -->
  <rect x="27" y="38" width="10" height="12" fill="#2C2416"/>
  <!-- Окно левое -->
  <rect x="17" y="32" width="8" height="7" rx="1" fill="#2C2416"/>
  <!-- Окно правое -->
  <rect x="39" y="32" width="8" height="7" rx="1" fill="#2C2416"/>
  <!-- Нижняя линия -->
  <rect x="8" y="50" width="48" height="3" rx="1.5" fill="#C9A84C" opacity="0.5"/>
</svg>
